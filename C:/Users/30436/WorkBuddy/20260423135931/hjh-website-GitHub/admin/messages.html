<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留言管理 - 泓锦浩后台</title>
  <link rel="stylesheet" href="../assets/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="sidebar-logo">
      <span class="sidebar-logo-icon">⚙</span>
      <div><h2>泓锦浩</h2><small>管理后台 v1.0</small></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">主要功能</div>
      <a href="index.html"><span class="nav-icon">📊</span> 数据总览</a>
      <a href="products.html"><span class="nav-icon">📦</span> 产品管理</a>
      <a href="content.html"><span class="nav-icon">✏️</span> 内容编辑</a>
      <a href="messages.html" class="active"><span class="nav-icon">💬</span> 留言管理</a>
      <div class="nav-section-title" style="margin-top:1rem;">系统</div>
      <a href="settings.html"><span class="nav-icon">⚙️</span> 网站设置</a>
      <a href="../index.html"><span class="nav-icon">🌐</span> 查看前台</a>
    </nav>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <h1>留言管理</h1>
      <div class="topbar-right">
        <span id="pendingBadge" style="background:#fff3e0;color:#7c4b00;padding:4px 12px;border-radius:12px;font-size:.82rem;font-weight:600;">待处理 1</span>
        <div class="admin-avatar">管</div>
      </div>
    </div>

    <div class="admin-content">
      <!-- 筛选 -->
      <div class="admin-card" style="margin-bottom:1.5rem;">
        <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:center;">
          <input type="text" id="msgSearch" placeholder="搜索姓名、公司或主题…" oninput="renderMsgs()" style="flex:1;min-width:200px;padding:9px 14px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:.88rem;font-family:inherit;outline:none;">
          <select id="statusFilter" onchange="renderMsgs()" style="padding:9px 14px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:.88rem;background:#fff;outline:none;cursor:pointer;">
            <option value="">全部状态</option>
            <option value="待处理">待处理</option>
            <option value="已回复">已回复</option>
            <option value="跟进中">跟进中</option>
            <option value="已关闭">已关闭</option>
          </select>
        </div>
      </div>

      <!-- 留言列表 -->
      <div id="msgCards"></div>
    </div>
  </main>
</div>

<!-- 回复弹窗 -->
<div id="replyModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:2rem;width:90%;max-width:520px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;">
      <h3 style="font-size:1.1rem;color:var(--gray-900);">回复留言</h3>
      <button onclick="document.getElementById('replyModal').style.display='none'" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--gray-500);">×</button>
    </div>
    <div id="replyInfo" style="background:var(--gray-50);border-radius:8px;padding:1rem;margin-bottom:1.2rem;font-size:.88rem;color:var(--gray-700);"></div>
    <div class="form-group">
      <label>回复内容</label>
      <textarea id="replyText" style="min-height:120px;padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:.9rem;font-family:inherit;width:100%;outline:none;resize:vertical;" placeholder="请输入回复内容…"></textarea>
    </div>
    <div style="display:flex;gap:1rem;justify-content:flex-end;margin-top:1rem;">
      <button onclick="document.getElementById('replyModal').style.display='none'" class="btn btn-outline" style="font-size:.88rem;">取消</button>
      <button onclick="sendReply()" class="btn btn-primary" style="font-size:.88rem;">发送回复</button>
    </div>
  </div>
</div>

<div id="globalToast" class="toast"></div>

<style>
  .msg-card {
    background:#fff;border-radius:var(--radius);padding:1.5rem;
    border:1px solid var(--gray-200);box-shadow:var(--shadow);
    margin-bottom:1rem;transition:var(--transition);
  }
  .msg-card:hover { box-shadow:var(--shadow-lg); }
  .msg-header { display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.8rem;flex-wrap:wrap;gap:.5rem; }
  .msg-meta   { display:flex;align-items:center;gap:1rem;flex-wrap:wrap; }
  .msg-author { font-weight:600;color:var(--gray-900); }
  .msg-company{ font-size:.85rem;color:var(--gray-500); }
  .msg-date   { font-size:.82rem;color:var(--gray-500); }
  .msg-subject{ font-size:1rem;color:var(--gray-900);margin-bottom:.5rem;font-weight:500; }
  .msg-actions{ display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1rem; }
  .msg-actions button {
    font-size:.8rem;padding:5px 14px;border-radius:6px;border:1px solid var(--gray-200);
    background:#fff;cursor:pointer;transition:var(--transition);
  }
  .msg-actions button:hover { background:var(--blue-light);border-color:var(--blue);color:var(--blue); }
</style>

<script src="../assets/data.js"></script>
<script>
const statusMap = { '待处理':'badge-orange', '已回复':'badge-green', '跟进中':'badge-blue', '已关闭':'badge-gray' };
let messages = [...SiteData.admin.messages];
let replyTargetId = null;

function renderMsgs() {
  const q   = (document.getElementById('msgSearch').value||'').toLowerCase();
  const st  = document.getElementById('statusFilter').value;
  const list = messages.filter(m =>
    (!q || m.name.includes(q) || m.company.includes(q) || m.subject.includes(q)) &&
    (!st || m.status === st)
  );
  const wrap = document.getElementById('msgCards');
  if (!list.length) {
    wrap.innerHTML='<div style="text-align:center;padding:3rem;color:var(--gray-500);">暂无匹配留言</div>';
    return;
  }
  wrap.innerHTML = list.map(m => `
    <div class="msg-card" id="msgcard-${m.id}">
      <div class="msg-header">
        <div class="msg-meta">
          <div class="author-avatar" style="width:36px;height:36px;font-size:.9rem;">${m.name[0]}</div>
          <div>
            <span class="msg-author">${m.name}</span>
            <div class="msg-company">${m.company}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:.8rem;">
          <span class="msg-date">${m.date}</span>
          <span class="badge ${statusMap[m.status]||'badge-gray'}" id="badge-${m.id}">${m.status}</span>
        </div>
      </div>
      <div class="msg-subject">${m.subject}</div>
      <div class="msg-actions">
        <button onclick="openReply(${m.id})">💬 回复</button>
        <button onclick="setStatus(${m.id},'已回复')">✓ 标记已回复</button>
        <button onclick="setStatus(${m.id},'跟进中')">🔄 标记跟进中</button>
        <button onclick="setStatus(${m.id},'已关闭')">✕ 关闭</button>
      </div>
    </div>`).join('');

  // 更新待处理徽章
  const pending = messages.filter(m => m.status === '待处理').length;
  const badge = document.getElementById('pendingBadge');
  badge.textContent = `待处理 ${pending}`;
  badge.style.display = pending > 0 ? 'inline' : 'none';
}

function setStatus(id, status) {
  const m = messages.find(x => x.id === id);
  if (m) { m.status = status; renderMsgs(); showToast(`状态已更新为：${status}`, 'success'); }
}

function openReply(id) {
  const m = messages.find(x => x.id === id);
  replyTargetId = id;
  document.getElementById('replyInfo').innerHTML = `<strong>${m.name}</strong>（${m.company}）— ${m.subject}`;
  document.getElementById('replyText').value = '';
  document.getElementById('replyModal').style.display = 'flex';
}

function sendReply() {
  const txt = document.getElementById('replyText').value.trim();
  if (!txt) { showToast('请填写回复内容', 'error'); return; }
  setStatus(replyTargetId, '已回复');
  document.getElementById('replyModal').style.display = 'none';
  showToast('回复已发送 ✓', 'success');
}

function showToast(msg, type='default') {
  const t = document.getElementById('globalToast');
  t.textContent=msg; t.className=`toast ${type}`;
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>t.classList.remove('show'),3000);
}

renderMsgs();
</script>
<script src="auth.js"></script>
</body>
</html>
