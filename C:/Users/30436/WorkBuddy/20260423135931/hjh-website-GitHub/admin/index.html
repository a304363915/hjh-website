<div class="admin-layout">

  <!-- 侧边栏 -->

      <div>

    <nav class="sidebar-nav">
      <div class="nav-section-title">主要功能</div>
      <a href="index.html" class="active"><span class="nav-icon">📊</span> 数据总览</a>
      <a href="products.html"><span class="nav-icon">📦</span> 产品管理</a>
      <a href="content.html"><span class="nav-icon">✏️</span> 内容编辑</a>
      <a href="messages.html"><span class="nav-icon">💬</span> 留言管理</a>
      <div class="nav-section-title" style="margin-top:1rem;">系统</div>
      <a href="settings.html"><span class="nav-icon">⚙️</span> 网站设置</a>
      <a href="../index.html"><span class="nav-icon">🌐</span> 查看前台</a>
    </nav>
    <div style="padding:1.5rem;border-top:1px solid rgba(255,255,255,.08);font-size:.8rem;color:rgba(255,255,255,.35);">
      © 2026 泓锦浩机械科技
    </div>
  </aside>

  <!-- 主内容区 -->
  <main class="admin-main">
    <div class="admin-topbar">
      <h1>数据总览</h1>
      <div class="topbar-right">
        <span style="font-size:.85rem;color:var(--gray-500);">今天 2026-04-23</span>
        <div class="admin-avatar" title="管理员">管</div>
        <button id="logoutBtn" onclick="adminLogout()" style="background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5;border-radius:6px;padding:.35rem .8rem;cursor:pointer;font-size:.82rem;transition:all .2s;" onmouseover="this.style.background='rgba(239,68,68,.25)'" onmouseout="this.style.background='rgba(239,68,68,.12)'">退出登录</button>
      </div>
    </div>

    <div class="admin-content">
      <!-- 统计卡片 -->
      <div class="stats-cards">
        <div class="stat-card">
          <div class="stat-card-header">
            <span class="stat-card-title">产品数量</span>
            <div class="stat-card-icon" style="background:#e8f4fd">📦</div>
          </div>
          <div class="stat-card-value" id="sc-products">9</div>
          <div class="stat-card-change">↑ 较上月 +2</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-header">
            <span class="stat-card-title">今日访问</span>
            <div class="stat-card-icon" style="background:#e8f8e8">👥</div>
          </div>
          <div class="stat-card-value" id="sc-visitors">128</div>
          <div class="stat-card-change">↑ 较昨日 +12%</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-header">
            <span class="stat-card-title">本月询盘</span>
            <div class="stat-card-icon" style="background:#fff3e0">📩</div>
          </div>
          <div class="stat-card-value" id="sc-inquiries">34</div>
          <div class="stat-card-change">↑ 较上月 +8</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-header">
            <span class="stat-card-title">待处理留言</span>
            <div class="stat-card-icon" style="background:#fce4ec">💬</div>
          </div>
          <div class="stat-card-value" id="sc-messages">1</div>
          <div class="stat-card-change" style="color:#e53e3e;">⚠ 待回复</div>
        </div>
      </div>

      <!-- 图表区域 -->
      <div class="admin-grid">
        <!-- 访问趋势 -->
        <div class="admin-card">
          <div class="admin-card-header">
            <span class="admin-card-title">近7日访问趋势</span>
            <span class="admin-card-action">查看详情</span>
          </div>
          <canvas id="visitChart" height="160"></canvas>
        </div>

        <!-- 产品分类占比 -->
        <div class="admin-card">
          <div class="admin-card-header">
            <span class="admin-card-title">产品分类分布</span>
            <span class="admin-card-action">管理产品</span>
          </div>
          <div id="catChart" style="padding:1rem 0;"></div>
        </div>
      </div>

      <!-- 最新留言 -->
      <div class="admin-card" style="margin-bottom:1.5rem;">
        <div class="admin-card-header">
          <span class="admin-card-title">最新留言</span>
          <a href="messages.html" class="admin-card-action">查看全部</a>
        </div>
        <table class="admin-table" id="msgTable">
          <thead>
            <tr>
              <th>#</th>
              <th>姓名</th>
              <th>公司</th>
              <th>主题</th>
              <th>时间</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="msgTbody"></tbody>
        </table>
      </div>

      <!-- 快捷操作 -->
      <div class="admin-card">
        <div class="admin-card-header">
          <span class="admin-card-title">快捷操作</span>
        </div>
        <div style="display:flex;gap:1rem;flex-wrap:wrap;">
          <a href="products.html" class="btn btn-primary" style="font-size:.88rem;">+ 添加产品</a>
          <a href="content.html"  class="btn btn-outline" style="font-size:.88rem;">✏️ 编辑首页内容</a>
          <a href="messages.html" class="btn btn-outline" style="font-size:.88rem;">💬 处理留言</a>
          <a href="settings.html" class="btn btn-outline" style="font-size:.88rem;">⚙️ 网站设置</a>
          <a href="../index.html" target="_blank" class="btn btn-outline" style="font-size:.88rem;">🌐 预览前台</a>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="globalToast" class="toast"></div>

<script src="../assets/data.js"></script>
<script>
// 渲染留言表格
const tbody = document.getElementById('msgTbody');
const statusMap = { '待处理': 'badge-orange', '已回复': 'badge-green', '跟进中': 'badge-blue', '已关闭': 'badge-gray' };
SiteData.admin.messages.forEach(m => {
  tbody.innerHTML += `
    <tr>
      <td>${m.id}</td>
      <td>${m.name}</td>
      <td>${m.company}</td>
      <td>${m.subject}</td>
      <td>${m.date}</td>
      <td><span class="badge ${statusMap[m.status]||'badge-gray'}">${m.status}</span></td>
      <td>
        <button onclick="markReplied(${m.id})" style="font-size:.8rem;padding:4px 10px;border:1px solid var(--gray-200);border-radius:6px;background:#fff;cursor:pointer;color:var(--blue);">回复</button>
      </td>
    </tr>`;
});

function markReplied(id) {
  const rows = document.querySelectorAll('#msgTbody tr');
  rows[id-1].querySelector('td:nth-child(6)').innerHTML = '<span class="badge badge-green">已回复</span>';
  showToast('留言已标记为已回复', 'success');
}

// 简易访问趋势图（纯 canvas）
(function drawVisitChart() {
  const canvas = document.getElementById('visitChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width  = canvas.offsetWidth || 400;
  canvas.height = 160;
  const data   = [98, 115, 87, 132, 110, 145, 128];
  const labels = ['4/17','4/18','4/19','4/20','4/21','4/22','4/23'];
  const W = canvas.width, H = canvas.height;
  const pad = { top:20, right:20, bottom:30, left:40 };
  const maxV = Math.max(...data) * 1.2;
  const chartW = W - pad.left - pad.right;
  const chartH = H - pad.top  - pad.bottom;

  ctx.clearRect(0,0,W,H);

  // 网格
  ctx.strokeStyle = '#f1f5f9'; ctx.lineWidth = 1;
  for (let i=0;i<=4;i++) {
    const y = pad.top + (chartH/4)*i;
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(W-pad.right,y); ctx.stroke();
  }

  // 折线填充
  const pts = data.map((v,i) => ({
    x: pad.left + (chartW/(data.length-1))*i,
    y: pad.top  + chartH*(1 - v/maxV)
  }));

  ctx.beginPath(); ctx.moveTo(pts[0].x, pad.top+chartH);
  pts.forEach(p => ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x, pad.top+chartH);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0,pad.top,0,pad.top+chartH);
  grad.addColorStop(0,'rgba(26,109,181,.25)'); grad.addColorStop(1,'rgba(26,109,181,0)');
  ctx.fillStyle = grad; ctx.fill();

  ctx.beginPath(); pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.strokeStyle = '#1a6db5'; ctx.lineWidth = 2.5; ctx.stroke();

  pts.forEach(p => {
    ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2);
    ctx.fillStyle='#1a6db5'; ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(p.x,p.y,2,0,Math.PI*2); ctx.fill();
  });

  // X轴标签
  ctx.fillStyle='#94a3b8'; ctx.font='11px Noto Sans SC,sans-serif'; ctx.textAlign='center';
  labels.forEach((l,i) => {
    const x = pad.left + (chartW/(data.length-1))*i;
    ctx.fillText(l, x, H-8);
  });
})();

// 产品分类占比（简易条形图）
(function drawCatChart() {
  const wrap = document.getElementById('catChart');
  if(!wrap || !window.SiteData) return;
  const cats = {};
  SiteData.products.forEach(p => { cats[p.category] = (cats[p.category]||0)+1; });
  const total = SiteData.products.length;
  const colors = ['#1a6db5','#e67e22','#27ae60','#8e44ad','#00acc1'];
  let i=0;
  for(const [cat,cnt] of Object.entries(cats)) {
    const pct = Math.round(cnt/total*100);
    wrap.innerHTML += `
      <div style="margin-bottom:.8rem;">
        <div style="display:flex;justify-content:space-between;font-size:.82rem;color:var(--gray-700);margin-bottom:.3rem;">
          <span>${cat}</span><span style="color:${colors[i%colors.length]};font-weight:600;">${cnt}件 (${pct}%)</span>
        </div>
        <div style="height:8px;background:var(--gray-100);border-radius:4px;overflow:hidden;">
          <div style="height:100%;width:${pct}%;background:${colors[i%colors.length]};border-radius:4px;transition:width .6s ease;"></div>
        </div>
      </div>`;
    i++;
  }
})();

function showToast(msg, type='default') {
  const t = document.getElementById('globalToast');
  t.textContent = msg; t.className=`toast ${type}`;
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
