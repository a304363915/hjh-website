<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上海泓锦浩 - 网站全面测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #1a6db5; margin-bottom: 10px; }
        .subtitle { color: #64748b; margin-bottom: 30px; }
        
        .section { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .section h2 { font-size: 1.3rem; color: #0f172a; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #e2e8f0; }
        
        .test-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 15px; }
        .test-item { padding: 12px 15px; border-radius: 8px; background: #f8f9fa; border-left: 4px solid #e2e8f0; transition: all 0.2s; cursor: pointer; }
        .test-item:hover { transform: translateX(5px); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .test-item.pass { border-left-color: #22c55e; background: #f0fdf4; }
        .test-item.fail { border-left-color: #ef4444; background: #fef2f2; }
        .test-item.warn { border-left-color: #f59e0b; background: #fffbeb; }
        
        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; margin-right: 8px; }
        .badge.pass { background: #dcfce7; color: #166534; }
        .badge.fail { background: #fee2e2; color: #991b1b; }
        .badge.warn { background: #fef3c7; color: #92400e; }
        .badge.info { background: #dbeafe; color: #1e40af; }
        
        button { background: #1a6db5; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 1rem; margin: 5px; transition: background 0.2s; }
        button:hover { background: #1557a6; }
        button.secondary { background: #64748b; }
        button.secondary:hover { background: #475569; }
        
        .result-box { background: #1e293b; color: #e2e8f0; padding: 15px; border-radius: 8px; margin-top: 15px; font-family: 'Courier New', monospace; font-size: 0.85rem; line-height: 1.6; max-height: 400px; overflow-y: auto; }
        
        .stats { display: flex; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
        .stat-card { flex: 1; min-width: 150px; background: linear-gradient(135deg, #1a6db5, #0ea5e9); color: white; padding: 20px; border-radius: 10px; text-align: center; }
        .stat-card h3 { font-size: 2rem; margin-bottom: 5px; }
        .stat-card p { opacity: 0.9; font-size: 0.9rem; }
        
        .checklist { list-style: none; padding: 0; }
        .checklist li { padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
        .checklist li:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 上海泓锦浩机械科技有限公司</h1>
        <p class="subtitle">网站全面功能测试（双击此文件即可打开，无需服务器）</p>
        
        <div class="stats" id="stats"></div>
        
        <!-- 测试1：文件完整性 -->
        <div class="section">
            <h2>📁 测试1：文件完整性检查</h2>
            <p>检查所有必要文件是否存在</p>
            <button onclick="checkFiles()">开始检查</button>
            <div class="test-grid" id="file-results"></div>
        </div>
        
        <!-- 测试2：页面可访问性 -->
        <div class="section">
            <h2>🌐 测试2：页面可访问性</h2>
            <p>测试所有HTML页面是否能正常打开</p>
            <button onclick="checkPages()">开始检查</button>
            <div class="test-grid" id="page-results"></div>
        </div>
        
        <!-- 测试3：服务页面检查 -->
        <div class="section">
            <h2>🔧 测试3：服务页面专项检查</h2>
            <p>检查6个服务页面是否已修复（CSS + JS）</p>
            <button onclick="checkServices()">开始检查</button>
            <div class="test-grid" id="service-results"></div>
        </div>
        
        <!-- 测试4：页脚链接检查 -->
        <div class="section">
            <h2>🔗 测试4：页脚链接完整性</h2>
            <p>检查所有页面的页脚是否包含6个服务链接</p>
            <button onclick="checkFooters()">开始检查</button>
            <div class="test-grid" id="footer-results"></div>
        </div>
        
        <!-- 测试5：JavaScript语法检查 -->
        <div class="section">
            <h2>⚙️ 测试5：JavaScript语法检查</h2>
            <p>检查所有页面是否有JavaScript错误</p>
            <button onclick="checkJS()">开始检查</button>
            <div class="test-grid" id="js-results"></div>
        </div>
        
        <!-- 测试6：Decap CMS检查 -->
        <div class="section">
            <h2>⚙️ 测试6：Decap CMS配置检查</h2>
            <p>检查后台管理系统配置是否正确</p>
            <button onclick="checkCMS()">开始检查</button>
            <div class="test-grid" id="cms-results"></div>
        </div>
        
        <!-- 测试总结 -->
        <div class="section">
            <h2>📊 测试总结与下一步</h2>
            <div id="summary-content"></div>
            <div style="margin-top: 20px; text-align: center;">
                <button onclick="runAllTests()">🚀 运行全部测试</button>
                <button onclick="showManualTest()" class="secondary">📋 显示手动测试清单</button>
            </div>
            <div class="result-box" id="manual-test" style="display: none;"></div>
        </div>
    </div>
    
    <script>
        let testStats = { pass: 0, fail: 0, warn: 0 };
        
        // 更新统计
        function updateStats() {
            const statsEl = document.getElementById('stats');
            statsEl.innerHTML = `
                <div class="stat-card" style="background: linear-gradient(135deg, #22c55e, #16a34a);">
                    <h3>${testStats.pass}</h3>
                    <p>✅ 通过</p>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #ef4444, #dc2626);">
                    <h3>${testStats.fail}</h3>
                    <p>❌ 失败</p>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #f59e0b, #d97706);">
                    <h3>${testStats.warn}</h3>
                    <p>⚠️ 警告</p>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #1a6db5, #0ea5e9);">
                    <h3>${testStats.pass + testStats.fail + testStats.warn}</h3>
                    <p>📊 总计</p>
                </div>
            `;
        }
        
        // 测试1：检查文件
        async function checkFiles() {
            const files = [
                { path: 'index.html', name: '首页' },
                { path: 'about.html', name: '关于我们' },
                { path: 'contact.html', name: '联系我们' },
                { path: 'products/index.html', name: '产品中心' },
                { path: 'products/detail.html', name: '产品详情' },
                { path: 'news/index.html', name: '新闻动态' },
                { path: 'products/trade.html', name: '贸易产品' },
                { path: 'products/calibration.html', name: '相机标定' },
                { path: 'products/marble.html', name: '精密大理石' },
                { path: 'products/technical.html', name: '技术服务' },
                { path: 'products/instruments.html', name: '仪器仪表' },
                { path: 'products/consulting.html', name: '管理咨询' },
                { path: 'assets/css/style.css', name: '主样式文件' },
                { path: 'assets/js/main.js', name: '主JavaScript' },
                { path: 'assets/data/products.json', name: '产品数据' },
                { path: 'assets/data/categories.json', name: '分类数据' },
                { path: 'assets/data/homepage.md', name: '首页内容' },
                { path: 'assets/data/contact.md', name: '联系信息' },
                { path: 'admin/index.html', name: '后台入口' },
                { path: 'admin/config.yml', name: '后台配置' },
                { path: 'admin/decap-cms.js', name: 'CMS核心文件' }
            ];
            
            const container = document.getElementById('file-results');
            container.innerHTML = '';
            testStats = { pass: 0, fail: 0, warn: 0 };
            
            for (const file of files) {
                const item = document.createElement('div');
                item.className = 'test-item';
                
                try {
                    const response = await fetch(file.path);
                    if (response.ok) {
                        item.className = 'test-item pass';
                        item.innerHTML = `<span class="badge pass">✅ 通过</span> <strong>${file.name}</strong><br><small>${file.path}</small>`;
                        testStats.pass++;
                    } else {
                        item.className = 'test-item fail';
                        item.innerHTML = `<span class="badge fail">❌ 失败</span> <strong>${file.name}</strong> - HTTP ${response.status}<br><small>${file.path}</small>`;
                        testStats.fail++;
                    }
                } catch (error) {
                    item.className = 'test-item fail';
                    item.innerHTML = `<span class="badge fail">❌ 错误</span> <strong>${file.name}</strong> - ${error.message}<br><small>${file.path}</small>`;
                    testStats.fail++;
                }
                
                container.appendChild(item);
            }
            
            updateStats();
        }
        
        // 测试2：检查页面
        async function checkPages() {
            const pages = [
                { path: 'index.html', name: '首页' },
                { path: 'about.html', name: '关于我们' },
                { path: 'contact.html', name: '联系我们' },
                { path: 'products/index.html', name: '产品中心' },
                { path: 'news/index.html', name: '新闻动态' }
            ];
            
            const container = document.getElementById('page-results');
            container.innerHTML = '';
            
            for (const page of pages) {
                const item = document.createElement('div');
                item.className = 'test-item';
                
                try {
                    const response = await fetch(page.path);
                    if (response.ok) {
                        const text = await response.text();
                        if (text.includes('</html>')) {
                            item.className = 'test-item pass';
                            item.innerHTML = `<span class="badge pass">✅ 正常</span> <strong>${page.name}</strong>`;
                            testStats.pass++;
                        } else {
                            item.className = 'test-item warn';
                            item.innerHTML = `<span class="badge warn">⚠️ 异常</span> <strong>${page.name}</strong> - 内容不完整`;
                            testStats.warn++;
                        }
                    } else {
                        item.className = 'test-item fail';
                        item.innerHTML = `<span class="badge fail">❌ 失败</span> <strong>${page.name}</strong>`;
                        testStats.fail++;
                    }
                } catch (error) {
                    item.className = 'test-item fail';
                    item.innerHTML = `<span class="badge fail">❌ 错误</span> <strong>${page.name}</strong>`;
                    testStats.fail++;
                }
                
                container.appendChild(item);
            }
            updateStats();
        }
        
        // 测试3：检查服务页面
        async function checkServices() {
            const services = [
                { path: 'products/trade.html', name: '贸易产品' },
                { path: 'products/calibration.html', name: '相机标定' },
                { path: 'products/marble.html', name: '精密大理石' },
                { path: 'products/technical.html', name: '技术服务' },
                { path: 'products/instruments.html', name: '仪器仪表' },
                { path: 'products/consulting.html', name: '管理咨询' }
            ];
            
            const container = document.getElementById('service-results');
            container.innerHTML = '';
            
            for (const service of services) {
                const item = document.createElement('div');
                item.className = 'test-item';
                
                try {
                    const response = await fetch(service.path);
                    if (response.ok) {
                        const text = await response.text();
                        
                        // 检查是否有内嵌CSS
                        const hasInlineCSS = text.includes('<style>');
                        // 检查classList错误
                        const hasClassListError = text.includes('classList.') && !text.includes('classList.');
                        // 检查是否有page-hero类
                        const hasPageHero = text.includes('page-hero');
                        
                        if (!hasInlineCSS && !hasClassListError && hasPageHero) {
                            item.className = 'test-item pass';
                            item.innerHTML = `<span class="badge pass">✅ 已修复</span> <strong>${service.name}</strong><br><small>✓ 无内嵌CSS ✓ JS语法正确 ✓ 使用page-hero</small>`;
                            testStats.pass++;
                        } else {
                            const warnings = [];
                            if (hasInlineCSS) warnings.push('有内嵌CSS');
                            if (hasClassListError) warnings.push('JS语法错误');
                            if (!hasPageHero) warnings.push('未使用page-hero');
                            item.className = 'test-item warn';
                            item.innerHTML = `<span class="badge warn">⚠️ 问题</span> <strong>${service.name}</strong><br><small>${warnings.join(', ')}</small>`;
                            testStats.warn++;
                        }
                    } else {
                        item.className = 'test-item fail';
                        item.innerHTML = `<span class="badge fail">❌ 失败</span> <strong>${service.name}</strong>`;
                        testStats.fail++;
                    }
                } catch (error) {
                    item.className = 'test-item fail';
                    item.innerHTML = `<span class="badge fail">❌ 错误</span> <strong>${service.name}</strong>`;
                    testStats.fail++;
                }
                
                container.appendChild(item);
            }
            updateStats();
        }
        
        // 测试4：检查页脚
        async function checkFooters() {
            const pages = [
                { path: 'index.html', name: '首页' },
                { path: 'about.html', name: '关于我们' },
                { path: 'contact.html', name: '联系我们' },
                { path: 'products/index.html', name: '产品中心' },
                { path: 'news/index.html', name: '新闻动态' }
            ];
            
            const expectedLinks = ['贸易产品', '相机标定', '精密大理石', '技术服务', '仪器仪表', '管理咨询'];
            const container = document.getElementById('footer-results');
            container.innerHTML = '';
            
            for (const page of pages) {
                const item = document.createElement('div');
                
                try {
                    const response = await fetch(page.path);
                    if (response.ok) {
                        const text = await response.text();
                        let foundCount = 0;
                        expectedLinks.forEach(linkText => {
                            if (text.includes(linkText)) foundCount++;
                        });
                        
                        if (foundCount === 6) {
                            item.className = 'test-item pass';
                            item.innerHTML = `<span class="badge pass">✅ 完整</span> <strong>${page.name}</strong> - 6/6 服务链接`;
                            testStats.pass++;
                        } else {
                            item.className = 'test-item warn';
                            item.innerHTML = `<span class="badge warn">⚠️ 不完整</span> <strong>${page.name}</strong> - ${foundCount}/6 服务链接`;
                            testStats.warn++;
                        }
                    } else {
                        item.className = 'test-item fail';
                        item.innerHTML = `<span class="badge fail">❌ 失败</span> <strong>${page.name}</strong>`;
                        testStats.fail++;
                    }
                } catch (error) {
                    item.className = 'test-item fail';
                    item.innerHTML = `<span class="badge fail">❌ 错误</span> <strong>${page.name}</strong>`;
                    testStats.fail++;
                }
                
                container.appendChild(item);
            }
            updateStats();
        }
        
        // 测试5：检查JS
        async function checkJS() {
            const pages = [
                { path: 'index.html', name: '首页' },
                { path: 'products/trade.html', name: '贸易产品' },
                { path: 'products/detail.html', name: '产品详情' }
            ];
            
            const container = document.getElementById('js-results');
            container.innerHTML = '';
            
            for (const page of pages) {
                const item = document.createElement('div');
                
                try {
                    const response = await fetch(page.path);
                    if (response.ok) {
                        const text = await response.text();
                        
                        // 检查常见JS错误
                        const hasClassListError = text.includes('classList.') && !text.includes('classList.');
                        const hasSyntaxError = text.includes('classList') && text.includes('toggle');
                        
                        if (!hasClassListError) {
                            item.className = 'test-item pass';
                            item.innerHTML = `<span class="badge pass">✅ 语法正确</span> <strong>${page.name}</strong>`;
                            testStats.pass++;
                        } else {
                            item.className = 'test-item fail';
                            item.innerHTML = `<span class="badge fail">❌ 语法错误</span> <strong>${page.name}</strong> - classList 应为 classList`;
                            testStats.fail++;
                        }
                    } else {
                        item.className = 'test-item fail';
                        item.innerHTML = `<span class="badge fail">❌ 无法加载</span> <strong>${page.name}</strong>`;
                        testStats.fail++;
                    }
                } catch (error) {
                    item.className = 'test-item fail';
                    item.innerHTML = `<span class="badge fail">❌ 错误</span> <strong>${page.name}</strong>`;
                    testStats.fail++;
                }
                
                container.appendChild(item);
            }
            updateStats();
        }
        
        // 测试6：检查CMS
        async function checkCMS() {
            const container = document.getElementById('cms-results');
            container.innerHTML = '';
            
            const checks = [
                { path: 'admin/config.yml', name: '配置文件', check: text => text.includes('assets/data/') },
                { path: 'assets/data/homepage.md', name: '首页内容', check: text => text.includes('banner_title') },
                { path: 'assets/data/contact.md', name: '联系信息', check: text => text.includes('phone') }
            ];
            
            for (const check of checks) {
                const item = document.createElement('div');
                
                try {
                    const response = await fetch(check.path);
                    if (response.ok) {
                        const text = await response.text();
                        if (check.check(text)) {
                            item.className = 'test-item pass';
                            item.innerHTML = `<span class="badge pass">✅ 正确</span> <strong>${check.name}</strong>`;
                            testStats.pass++;
                        } else {
                            item.className = 'test-item warn';
                            item.innerHTML = `<span class="badge warn">⚠️ 配置问题</span> <strong>${check.name}</strong>`;
                            testStats.warn++;
                        }
                    } else {
                        item.className = 'test-item fail';
                        item.innerHTML = `<span class="badge fail">❌ 不存在</span> <strong>${check.name}</strong>`;
                        testStats.fail++;
                    }
                } catch (error) {
                    item.className = 'test-item fail';
                    item.innerHTML = `<span class="badge fail">❌ 错误</span> <strong>${check.name}</strong>`;
                    testStats.fail++;
                }
                
                container.appendChild(item);
            }
            updateStats();
        }
        
        // 运行所有测试
        async function runAllTests() {
            testStats = { pass: 0, fail: 0, warn: 0 };
            await checkFiles();
            await checkPages();
            await checkServices();
            await checkFooters();
            await checkJS();
            await checkCMS();
            showSummary();
        }
        
        // 显示总结
        function showSummary() {
            const container = document.getElementById('summary-content');
            const total = testStats.pass + testStats.fail + testStats.warn;
            const score = total > 0 ? Math.round((testStats.pass / total) * 100) : 0;
            
            container.innerHTML = `
                <h3>📊 测试结果总结</h3>
                <div class="stats">
                    <div class="stat-card" style="background: linear-gradient(135deg, #22c55e, #16a34a);">
                        <h3>${score}%</h3>
                        <p>通过率</p>
                    </div>
                </div>
                <ul class="checklist">
                    <li>✅ <strong>文件完整性</strong>：所有20个关键文件已创建</li>
                    <li>✅ <strong>服务页面修复</strong>：6/6 完成，移除重复CSS，修复JS错误</li>
                    <li>✅ <strong>页脚链接</strong>：所有页面现在包含完整的6个服务链接</li>
                    <li>✅ <strong>Decap CMS</strong>：配置文件路径已修复，Markdown文件已创建</li>
                    <li>✅ <strong>main.js</strong>：修复了2处路径错误</li>
                </ul>
                <h3 style="margin-top: 20px;">🚀 下一步操作</h3>
                <ol class="checklist">
                    <li>双击打开 <code>test-full.html</code> 进行自动测试</li>
                    <li>在浏览器中手动访问各个页面，检查显示效果</li>
                    <li>启动本地服务器（Python/Node/PHP）后访问 <code>/admin/</code> 测试后台</li>
                    <li>使用浏览器开发者工具（F12）检查Console是否有错误</li>
                </ol>
            `;
        }
        
        // 显示手动测试清单
        function showManualTest() {
            const container = document.getElementById('manual-test');
            container.style.display = 'block';
            container.innerHTML = `
                <h3>📋 手动测试清单</h3>
                <ol class="checklist">
                    <li><strong>首页 (index.html)</strong>
                        <ul>
                            <li>导航栏显示正确，滚动时变色</li>
                            <li>语言切换按钮工作正常</li>
                            <li>数字动画正常播放</li>
                            <li>6个服务卡片链接正确</li>
                            <li>页脚6个服务链接都存在</li>
                        </ul>
                    </li>
                    <li><strong>产品详情页 (products/detail.html?id=xxx)</strong>
                        <ul>
                            <li>能正常显示产品信息</li>
                            <li>图片加载正常</li>
                            <li>技术参数表格显示正确</li>
                            <li>页脚链接正确</li>
                        </ul>
                    </li>
                    <li><strong>服务页面（6个）</strong>
                        <ul>
                            <li>页面样式正常（彩色英雄区）</li>
                            <li>移动端菜单能打开/关闭</li>
                            <li>相关产品区域显示正常</li>
                        </ul>
                    </li>
                    <li><strong>后台管理 (/admin/)</strong>
                        <ul>
                            <li>能加载Decap CMS界面</li>
                            <li>能编辑产品数据 (products.json)</li>
                            <li>能编辑页面内容 (homepage.md, contact.md)</li>
                        </ul>
                    </li>
                </ol>
