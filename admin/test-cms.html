<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台加载测试 - 泓锦浩机械</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #1a6db5; margin-bottom: 20px; }
        
        .test-section { background: white; padding: 20px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .test-section h2 { color: #333; margin-bottom: 10px; font-size: 1.2rem; }
        
        .status { padding: 10px; border-radius: 5px; margin: 10px 0; font-weight: bold; }
        .status.pass { background: #d4edda; color: #155724; }
        .status.fail { background: #f8d7da; color: #721c24; }
        .status.info { background: #d1ecf1; color: #0c5460; }
        
        button { background: #1a6db5; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; font-size: 1rem; }
        button:hover { background: #155a9a; }
        
        #log { background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 5px; font-family: "Courier New", monospace; font-size: 0.9rem; max-height: 400px; overflow-y: auto; margin-top: 15px; }
        
        .success { color: #4ec9b0; }
        .error { color: #f48771; }
        .info { color: #9cdcfe; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 后台加载诊断工具</h1>
        
        <div class="test-section">
            <h2>步骤 1: 检查 Decap CMS 脚本加载</h2>
            <button onclick="testScriptLoad()">测试脚本加载</button>
            <div id="script-status"></div>
        </div>
        
        <div class="test-section">
            <h2>步骤 2: 手动加载 Decap CMS</h2>
            <button onclick="loadCMS()">加载 CMS</button>
            <div id="cms-status"></div>
        </div>
        
        <div class="test-section">
            <h2>📋 实时日志</h2>
            <div id="log"></div>
        </div>
        
        <div class="test-section">
            <h2>🚀 直接访问后台</h2>
            <p>如果上面的测试都通过，点击下面的按钮访问后台：</p>
            <button onclick="window.location.href='index.html'">进入后台</button>
            <button onclick="window.location.href='../index.html'">返回首页</button>
        </div>
    </div>
    
    <script>
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : 'ℹ️';
            logDiv.innerHTML += `<div class="${type}">[${time}] ${prefix} ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function testScriptLoad() {
            log('开始检查 Decap CMS 脚本...');
            const statusDiv = document.getElementById('script-status');
            
            // 检查脚本标签
            const scripts = document.querySelectorAll('script');
            let found = false;
            scripts.forEach(script => {
                if (script.src.includes('decap') || script.src.includes('cms')) {
                    log(`找到 CMS 脚本: ${script.src}`);
                    found = true;
                }
            });
            
            if (!found) {
                log('未找到 Decap CMS 脚本标签，准备动态加载...', 'info');
                statusDiv.innerHTML = '<div class="status info">未找到脚本标签，点击下方按钮手动加载</div>';
            } else {
                log('脚本标签已存在', 'success');
                statusDiv.innerHTML = '<div class="status pass">✅ Decap CMS 脚本已加载</div>';
            }
        }
        
        function loadCMS() {
            log('开始加载 Decap CMS...');
            const statusDiv = document.getElementById('cms-status');
            
            // 尝试多个 CDN
            const cdns = [
                'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js',
                'https://cdn.jsdelivr.net/npm/decap-cms@^3.0.0/dist/decap-cms.js',
                './decap-cms.js'
            ];
            
            let loaded = false;
            
            cdns.forEach((cdn, index) => {
                if (loaded) return;
                
                log(`尝试 CDN ${index + 1}: ${cdn}`);
                
                const script = document.createElement('script');
                script.src = cdn;
                script.onload = function() {
                    log(`✅ CDN ${index + 1} 加载成功！`, 'success');
                    statusDiv.innerHTML = '<div class="status pass">✅ Decap CMS 加载成功！等待初始化...</div>';
                    loaded = true;
                    
                    // 等待 CMS 初始化
                    setTimeout(() => {
                        if (window.CMS) {
                            log('CMS 已初始化，可以访问后台了！', 'success');
                            statusDiv.innerHTML = '<div class="status pass">✅ CMS 已就绪！<a href="index.html">点击这里进入后台</a></div>';
                        }
                    }, 2000);
                };
                
                script.onerror = function() {
                    log(`❌ CDN ${index + 1} 加载失败`, 'error');
                    if (index === cdns.length - 1) {
                        statusDiv.innerHTML = '<div class="status fail">❌ 所有 CDN 都加载失败，请检查网络连接</div>';
                    }
                };
                
                document.head.appendChild(script);
            });
        }
        
        // 页面加载时自动检查
        window.addEventListener('load', function() {
            log('页面加载完成，开始自动诊断...');
            testScriptLoad();
        });
    </script>
</body>
</html>
