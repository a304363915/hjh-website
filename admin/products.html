<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产品管理 - 泓锦浩后台</title>
  <link rel="stylesheet" href="../assets/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="auth.js"></script>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="sidebar-logo">
      <span class="sidebar-logo-icon">⚙</span>
      <div><h2>泓锦浩</h2><small>管理后台 v1.0</small></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">主要功能</div>
      <a href="index.html"><span class="nav-icon">📊</span> 数据总览</a>
      <a href="products.html" class="active"><span class="nav-icon">📦</span> 产品管理</a>
      <a href="content.html"><span class="nav-icon">✏️</span> 内容编辑</a>
      <a href="messages.html"><span class="nav-icon">💬</span> 留言管理</a>
      <div class="nav-section-title" style="margin-top:1rem;">系统</div>
      <a href="settings.html"><span class="nav-icon">⚙️</span> 网站设置</a>
      <a href="../index.html"><span class="nav-icon">🌐</span> 查看前台</a>
    </nav>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <h1>产品管理</h1>
      <div class="topbar-right">
        <button class="btn btn-primary" style="font-size:.85rem;padding:8px 20px;" onclick="openAddModal()">+ 添加产品</button>
        <div class="admin-avatar">管</div>
      </div>
    </div>

    <div class="admin-content">
      <!-- 搜索/筛选栏 -->
      <div class="admin-card" style="margin-bottom:1.5rem;">
        <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:center;">
          <input type="text" id="searchInput" placeholder="搜索产品名称…" oninput="filterList()" style="flex:1;min-width:200px;padding:9px 14px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:.88rem;font-family:inherit;outline:none;">
          <select id="catFilter" onchange="filterList()" style="padding:9px 14px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:.88rem;background:#fff;outline:none;cursor:pointer;">
            <option value="">全部分类</option>
            <option value="calibration">相机标定</option>
            <option value="marble">精密大理石</option>
            <option value="trade">贸易产品</option>
            <option value="service">技术服务</option>
          </select>
        </div>
      </div>

      <!-- 产品表格 -->
      <div class="admin-card">
        <div class="admin-card-header">
          <span class="admin-card-title">产品列表 (<span id="listCount">0</span>)</span>
        </div>
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>图标</th>
              <th>产品名称</th>
              <th>分类</th>
              <th>标签</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="productsTbody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- 编辑/添加产品弹窗 -->
<div id="productModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:2rem;width:90%;max-width:560px;max-height:90vh;overflow-y:auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
      <h3 id="modalTitle" style="font-size:1.2rem;color:var(--gray-900);">添加产品</h3>
      <button onclick="closeModal()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--gray-500);">×</button>
    </div>
    <form id="productForm">
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-group">
          <label>产品名称 *</label>
          <input type="text" id="pName" placeholder="请输入产品名称" required>
        </div>
        <div class="form-group">
          <label>分类</label>
          <select id="pCat">
            <option value="calibration">相机标定</option>
            <option value="marble">精密大理石</option>
            <option value="trade">贸易产品</option>
            <option value="service">技术服务</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>图标 Emoji</label>
          <input type="text" id="pEmoji" placeholder="如 📷 🔧 ⚙️">
        </div>
        <div class="form-group">
          <label>标签（逗号分隔）</label>
          <input type="text" id="pTags" placeholder="如 机器视觉,标定">
        </div>
      </div>
      <div class="form-group">
        <label>产品描述</label>
        <textarea id="pDesc" style="min-height:100px;" placeholder="请输入产品详细描述…"></textarea>
      </div>
      <div style="display:flex;gap:1rem;justify-content:flex-end;margin-top:1rem;">
        <button type="button" onclick="closeModal()" class="btn btn-outline" style="font-size:.88rem;">取消</button>
        <button type="submit" class="btn btn-primary" style="font-size:.88rem;">保存产品</button>
      </div>
    </form>
  </div>
</div>

<div id="globalToast" class="toast"></div>

<script src="../assets/data.js"></script>
<script>
const catNames = { calibration:'相机标定', marble:'精密大理石', trade:'贸易产品', service:'技术服务' };
let products = [...SiteData.products];

function renderTable(list) {
  document.getElementById('listCount').textContent = list.length;
  const tbody = document.getElementById('productsTbody');
  tbody.innerHTML = '';
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--gray-500);">暂无产品数据</td></tr>';
    return;
  }
  list.forEach(p => {
    tbody.innerHTML += `
      <tr>
        <td style="color:var(--gray-500)">#${p.id}</td>
        <td style="font-size:1.5rem">${p.emoji}</td>
        <td style="font-weight:500;color:var(--gray-900)">${p.name}</td>
        <td><span class="badge badge-blue">${p.category}</span></td>
        <td>${p.tags.map(t=>`<span class="tag" style="font-size:.72rem;margin:2px">${t}</span>`).join('')}</td>
        <td>
          <button onclick="editProduct(${p.id})" style="font-size:.8rem;padding:4px 10px;border:1px solid var(--gray-200);border-radius:6px;background:#fff;cursor:pointer;color:var(--blue);margin-right:4px;">编辑</button>
          <button onclick="delProduct(${p.id})" style="font-size:.8rem;padding:4px 10px;border:1px solid #fca5a5;border-radius:6px;background:#fff;cursor:pointer;color:#e53e3e;">删除</button>
        </td>
      </tr>`;
  });
}

function filterList() {
  const q    = document.getElementById('searchInput').value.toLowerCase();
  const cat  = document.getElementById('catFilter').value;
  renderTable(products.filter(p =>
    (!q || p.name.toLowerCase().includes(q)) &&
    (!cat || p.cat_key === cat)
  ));
}

function openAddModal() {
  document.getElementById('modalTitle').textContent = '添加产品';
  document.getElementById('productForm').reset();
  document.getElementById('editId').value = '';
  document.getElementById('productModal').style.display = 'flex';
}

function closeModal() { document.getElementById('productModal').style.display = 'none'; }

function editProduct(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modalTitle').textContent = '编辑产品';
  document.getElementById('editId').value  = id;
  document.getElementById('pName').value   = p.name;
  document.getElementById('pCat').value    = p.cat_key;
  document.getElementById('pEmoji').value  = p.emoji;
  document.getElementById('pTags').value   = p.tags.join(',');
  document.getElementById('pDesc').value   = p.desc;
  document.getElementById('productModal').style.display = 'flex';
}

function delProduct(id) {
  if (!confirm('确定删除该产品吗？')) return;
  products = products.filter(p => p.id !== id);
  filterList();
  showToast('产品已删除', 'success');
}

document.getElementById('productForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const id     = document.getElementById('editId').value;
  const name   = document.getElementById('pName').value.trim();
  const catKey = document.getElementById('pCat').value;
  const emoji  = document.getElementById('pEmoji').value.trim() || '⚙️';
  const tags   = document.getElementById('pTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const desc   = document.getElementById('pDesc').value.trim();
  if (!name) { showToast('请填写产品名称', 'error'); return; }
  if (id) {
    const p = products.find(x => x.id === parseInt(id));
    if (p) { p.name=name; p.cat_key=catKey; p.category=catNames[catKey]; p.emoji=emoji; p.tags=tags; p.desc=desc; }
  } else {
    products.push({ id: Date.now(), name, cat_key:catKey, category:catNames[catKey], emoji, tags, desc, bg:'linear-gradient(135deg,#e8f4fd,#dbeafe)' });
  }
  closeModal(); filterList();
  showToast(id ? '产品已更新 ✓' : '产品已添加 ✓', 'success');
});

function showToast(msg, type='default') {
  const t = document.getElementById('globalToast');
  t.textContent=msg; t.className=`toast ${type}`;
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>t.classList.remove('show'),3000);
}

renderTable(products);
</script>
</body>
</html>
