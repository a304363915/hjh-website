<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网站设置 - 泓锦浩后台</title>
  <link rel="stylesheet" href="../assets/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="auth.js"></script>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="sidebar-logo">
      <span class="sidebar-logo-icon">⚙</span>
      <div><h2>泓锦浩</h2><small>管理后台 v1.0</small></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">主要功能</div>
      <a href="index.html"><span class="nav-icon">📊</span> 数据总览</a>
      <a href="products.html"><span class="nav-icon">📦</span> 产品管理</a>
      <a href="content.html"><span class="nav-icon">✏️</span> 内容编辑</a>
      <a href="messages.html"><span class="nav-icon">💬</span> 留言管理</a>
      <div class="nav-section-title" style="margin-top:1rem;">系统</div>
      <a href="settings.html" class="active"><span class="nav-icon">⚙️</span> 网站设置</a>
      <a href="../index.html"><span class="nav-icon">🌐</span> 查看前台</a>
    </nav>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <h1>网站设置</h1>
      <div class="topbar-right">
        <div class="admin-avatar">管</div>
      </div>
    </div>

    <div class="admin-content">
      <!-- 基础信息 -->
      <div class="admin-card" style="margin-bottom:1.5rem;">
        <div class="admin-card-header"><span class="admin-card-title">基础信息</span></div>
        <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div class="form-group">
            <label>网站名称</label>
            <input type="text" id="siteName" value="上海泓锦浩机械科技有限公司" style="padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:.9rem;font-family:inherit;width:100%;outline:none;">
          </div>
          <div class="form-group">
            <label>公司简称</label>
            <input type="text" id="siteShortName" value="泓锦浩机械科技" style="padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:.9rem;font-family:inherit;width:100%;outline:none;">
          </div>
        </div>
        <div class="form-group" style="margin-top:1rem;">
          <label>网站描述（SEO）</label>
          <textarea id="siteDesc" style="padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:.9rem;font-family:inherit;width:100%;outline:none;min-height:80px;resize:vertical;">上海泓锦浩机械科技有限公司，专注贸易产品、相机标定、精密大理石等精密机械领域，提供全方位机械设备与技术服务。</textarea>
        </div>
        <div class="form-group" style="margin-top:1rem;">
          <label>关键词（SEO，用逗号分隔）</label>
          <input type="text" id="siteKeywords" value="相机标定,精密大理石,机械设备,泓锦浩,技术服务,仪器仪表" style="padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:.9rem;font-family:inherit;width:100%;outline:none;">
        </div>
        <button class="btn btn-primary" style="font-size:.85rem;margin-top:1rem;" onclick="saveBasic()">保存基础信息</button>
      </div>

      <!-- 主题颜色 -->
      <div class="admin-card" style="margin-bottom:1.5rem;">
        <div class="admin-card-header"><span class="admin-card-title">主题颜色</span></div>
        <div style="display:flex;gap:1.5rem;flex-wrap:wrap;align-items:center;margin-bottom:1.5rem;">
          <div>
            <label style="display:block;font-size:.85rem;color:var(--gray-700);margin-bottom:.5rem;">主色调</label>
            <div style="display:flex;align-items:center;gap:.8rem;">
              <input type="color" id="primaryColor" value="#1a6db5" style="width:44px;height:44px;border:none;border-radius:8px;cursor:pointer;">
              <input type="text" id="primaryColorHex" value="#1a6db5" oninput="syncColor()" style="width:90px;padding:8px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:.88rem;font-family:monospace;outline:none;">
            </div>
          </div>
          <div>
            <label style="display:block;font-size:.85rem;color:var(--gray-700);margin-bottom:.5rem;">强调色</label>
            <div style="display:flex;align-items:center;gap:.8rem;">
              <input type="color" id="accentColor" value="#e67e22" style="width:44px;height:44px;border:none;border-radius:8px;cursor:pointer;">
              <input type="text" id="accentColorHex" value="#e67e22" style="width:90px;padding:8px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:.88rem;font-family:monospace;outline:none;">
            </div>
          </div>
        </div>
        <div style="display:flex;gap:1rem;align-items:center;">
          <div style="flex:1;height:48px;border-radius:10px;background:linear-gradient(135deg,#1a6db5,#e67e22);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.9rem;font-weight:600;" id="colorPreview">颜色预览效果</div>
          <button class="btn btn-primary" style="font-size:.85rem;" onclick="saveColors()">应用颜色</button>
        </div>
      </div>

      <!-- 统计代码 -->
      <div class="admin-card" style="margin-bottom:1.5rem;">
        <div class="admin-card-header"><span class="admin-card-title">统计代码</span></div>
        <div class="form-group">
          <label>Google Analytics / 百度统计代码</label>
          <textarea id="analyticsCode" style="padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:.85rem;font-family:monospace;width:100%;outline:none;min-height:100px;resize:vertical;" placeholder="粘贴统计代码到此处…"></textarea>
        </div>
        <button class="btn btn-outline" style="font-size:.85rem;" onclick="saveAnalytics()">保存统计代码</button>
      </div>

      <!-- 备案信息 -->
      <div class="admin-card">
        <div class="admin-card-header"><span class="admin-card-title">备案 & 版权</span></div>
        <div class="form-group">
          <label>ICP 备案号</label>
          <input type="text" id="icp" placeholder="如：沪ICP备XXXXXXXX号" style="padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:.9rem;font-family:inherit;width:100%;outline:none;">
        </div>
        <div class="form-group" style="margin-top:1rem;">
          <label>版权文字</label>
          <input type="text" id="copyright" value="© 2026 上海泓锦浩机械科技有限公司 版权所有" style="padding:10px 14px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:.9rem;font-family:inherit;width:100%;outline:none;">
        </div>
        <button class="btn btn-primary" style="font-size:.85rem;margin-top:1rem;" onclick="saveFooter()">保存版权信息</button>
      </div>
    </div>
  </main>
</div>

<div id="globalToast" class="toast"></div>

<script src="../assets/data.js"></script>
<script>
document.getElementById('primaryColor').addEventListener('input', function() {
  document.getElementById('primaryColorHex').value = this.value;
  updatePreview();
});
document.getElementById('accentColor').addEventListener('input', function() {
  document.getElementById('accentColorHex').value = this.value;
  updatePreview();
});

function updatePreview() {
  const c1 = document.getElementById('primaryColor').value;
  const c2 = document.getElementById('accentColor').value;
  document.getElementById('colorPreview').style.background = `linear-gradient(135deg,${c1},${c2})`;
}

function syncColor() {
  const hex = document.getElementById('primaryColorHex').value;
  if (/^#[0-9a-fA-F]{6}$/.test(hex)) document.getElementById('primaryColor').value = hex;
}

function saveBasic() {
  const data = {
    name: document.getElementById('siteName').value,
    short: document.getElementById('siteShortName').value,
    desc: document.getElementById('siteDesc').value,
    keywords: document.getElementById('siteKeywords').value,
  };
  localStorage.setItem('hjh_site_basic', JSON.stringify(data));
  showToast('基础信息已保存 ✓', 'success');
}

function saveColors() {
  const c = { primary: document.getElementById('primaryColor').value, accent: document.getElementById('accentColor').value };
  localStorage.setItem('hjh_site_colors', JSON.stringify(c));
  showToast('颜色设置已保存，刷新前台生效 ✓', 'success');
}

function saveAnalytics() {
  localStorage.setItem('hjh_analytics', document.getElementById('analyticsCode').value);
  showToast('统计代码已保存 ✓', 'success');
}

function saveFooter() {
  const d = { icp: document.getElementById('icp').value, copyright: document.getElementById('copyright').value };
  localStorage.setItem('hjh_footer', JSON.stringify(d));
  showToast('版权信息已保存 ✓', 'success');
}

// 加载已保存设置
window.addEventListener('DOMContentLoaded', () => {
  const b = JSON.parse(localStorage.getItem('hjh_site_basic')||'{}');
  if (b.name)  document.getElementById('siteName').value = b.name;
  if (b.short) document.getElementById('siteShortName').value = b.short;
  if (b.desc)  document.getElementById('siteDesc').value = b.desc;
  if (b.keywords) document.getElementById('siteKeywords').value = b.keywords;

  const c = JSON.parse(localStorage.getItem('hjh_site_colors')||'{}');
  if (c.primary) { document.getElementById('primaryColor').value = c.primary; document.getElementById('primaryColorHex').value = c.primary; }
  if (c.accent)  { document.getElementById('accentColor').value  = c.accent;  document.getElementById('accentColorHex').value  = c.accent;  }
  updatePreview();

  const f = JSON.parse(localStorage.getItem('hjh_footer')||'{}');
  if (f.icp)       document.getElementById('icp').value = f.icp;
  if (f.copyright) document.getElementById('copyright').value = f.copyright;
  if (localStorage.getItem('hjh_analytics')) document.getElementById('analyticsCode').value = localStorage.getItem('hjh_analytics');
});

function showToast(msg, type='default') {
  const t = document.getElementById('globalToast');
  t.textContent=msg; t.className=`toast ${type}`;
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
