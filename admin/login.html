<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台登录 - 泓锦浩机械科技</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f4c81 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* 背景装饰 */
    body::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(37,99,235,.15) 0%, transparent 70%);
      top: -200px; right: -200px;
      border-radius: 50%;
    }
    body::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(6,182,212,.1) 0%, transparent 70%);
      bottom: -150px; left: -100px;
      border-radius: 50%;
    }

    .login-card {
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      width: 420px;
      max-width: 95vw;
      position: relative;
      z-index: 1;
      box-shadow: 0 25px 60px rgba(0,0,0,.4);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .login-logo .logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #2563eb, #0ea5e9);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: 1rem;
      box-shadow: 0 8px 25px rgba(37,99,235,.4);
    }
    .login-logo h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: .05em;
    }
    .login-logo p {
      font-size: .85rem;
      color: rgba(255,255,255,.4);
      margin-top: .3rem;
    }

    .form-group {
      margin-bottom: 1.4rem;
    }
    .form-label {
      display: block;
      font-size: .85rem;
      color: rgba(255,255,255,.6);
      margin-bottom: .5rem;
      font-weight: 500;
    }
    .form-input-wrap {
      position: relative;
    }
    .form-input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,.3);
      font-size: 1rem;
      pointer-events: none;
    }
    .form-input {
      width: 100%;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      padding: .85rem 1rem .85rem 2.8rem;
      color: #fff;
      font-size: .95rem;
      transition: all .2s;
      outline: none;
    }
    .form-input::placeholder { color: rgba(255,255,255,.25); }
    .form-input:focus {
      border-color: #2563eb;
      background: rgba(37,99,235,.1);
      box-shadow: 0 0 0 3px rgba(37,99,235,.15);
    }

    .toggle-pw {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,.3);
      cursor: pointer;
      font-size: .9rem;
      padding: 0;
      transition: color .2s;
    }
    .toggle-pw:hover { color: rgba(255,255,255,.7); }

    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, #2563eb, #0ea5e9);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: .95rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      margin-top: .5rem;
      letter-spacing: .05em;
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(37,99,235,.5);
    }
    .login-btn:active { transform: translateY(0); }
    .login-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .error-msg {
      display: none;
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.3);
      color: #fca5a5;
      border-radius: 8px;
      padding: .75rem 1rem;
      font-size: .85rem;
      margin-top: 1rem;
      text-align: center;
    }
    .error-msg.show { display: block; }

    .login-hint {
      text-align: center;
      margin-top: 1.5rem;
      font-size: .8rem;
      color: rgba(255,255,255,.2);
    }
    .login-hint a {
      color: rgba(255,255,255,.4);
      text-decoration: none;
      transition: color .2s;
    }
    .login-hint a:hover { color: rgba(255,255,255,.7); }

    .lock-warn {
      display: none;
      background: rgba(245,158,11,.1);
      border: 1px solid rgba(245,158,11,.3);
      color: #fcd34d;
      border-radius: 8px;
      padding: .75rem 1rem;
      font-size: .85rem;
      margin-top: 1rem;
      text-align: center;
    }
    .lock-warn.show { display: block; }

    /* 加载动画 */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: .5rem;
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <div class="logo-icon">🔧</div>
    <h1>泓锦浩机械科技</h1>
    <p>管理后台 · 安全访问</p>
  </div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label class="form-label">管理员账号</label>
      <div class="form-input-wrap">
        <span class="form-input-icon">👤</span>
        <input type="text" id="username" class="form-input"
               placeholder="请输入管理员账号" autocomplete="username" required>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">登录密码</label>
      <div class="form-input-wrap">
        <span class="form-input-icon">🔒</span>
        <input type="password" id="password" class="form-input"
               placeholder="请输入密码" autocomplete="current-password" required>
        <button type="button" class="toggle-pw" onclick="togglePw()" id="togglePwBtn">👁</button>
      </div>
    </div>

    <button type="submit" class="login-btn" id="loginBtn">登 录</button>

    <div class="error-msg" id="errorMsg">账号或密码错误，请重新输入</div>
    <div class="lock-warn" id="lockWarn">登录失败次数过多，请 <span id="lockCountdown">30</span> 秒后重试</div>
  </form>

  <div class="login-hint">
    <a href="../index.html">← 返回官网首页</a>
  </div>
</div>

<script>
// ============================================================
// 账号密码配置（部署到服务器后建议改为后端验证）
// 默认账号: admin  密码: hjh@2026
// ============================================================
const ADMIN_USERS = [
  { username: 'admin', password: 'hjh@2026', role: '超级管理员' }
];

const SESSION_KEY  = 'hjh_admin_token';
const MAX_FAIL     = 5;     // 最多连续失败次数
const LOCK_SECONDS = 30;    // 锁定秒数

// 已登录则直接跳转
if (sessionStorage.getItem(SESSION_KEY)) {
  location.replace('index.html');
}

// 锁定仅在当前页面会话内有效，刷新页面即可重置
let failCount  = 0;
let lockedUntil = 0;

// 页面加载时检查锁定状态
checkLock();

function checkLock() {
  if (Date.now() < lockedUntil) {
    startLockTimer();
    return true;
  }
  return false;
}

function startLockTimer() {
  const btn = document.getElementById('loginBtn');
  const warn = document.getElementById('lockWarn');
  const cd   = document.getElementById('lockCountdown');
  btn.disabled = true;
  warn.classList.add('show');

  const timer = setInterval(() => {
    const remain = Math.ceil((lockedUntil - Date.now())  / 1000);
    if (remain <= 0) {
      clearInterval(timer);
      btn.disabled = false;
      warn.classList.remove('show');
      failCount = 0;
    } else {
      cd.textContent = remain;
    }
  }, 500);
}

function handleLogin(e) {
  e.preventDefault();
  if (checkLock()) return;

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');
  const errMsg   = document.getElementById('errorMsg');

  // 按钮加载状态
  btn.innerHTML = '<span class="spinner"></span>验证中...';
  btn.disabled  = true;

  // 模拟网络延迟（真实后端部署时替换为 fetch 请求）
  setTimeout(() => {
    const user = ADMIN_USERS.find(u => u.username === username && u.password === password);

    if (user) {
      // 登录成功
      failCount = 0;
      lockedUntil = 0;

      // 生成简单 token（格式: base64(username:timestamp)）
      const token = btoa(username + ':' + Date.now() + ':' + user.role);
      sessionStorage.setItem(SESSION_KEY, token);
      sessionStorage.setItem('hjh_admin_user', JSON.stringify({ username, role: user.role }));

      btn.innerHTML = '✓ 登录成功，跳转中...';
      setTimeout(() => location.replace('index.html'), 600);
    } else {
      // 登录失败
      failCount++;

      if (failCount >= MAX_FAIL) {
        lockedUntil = Date.now() + LOCK_SECONDS * 1000;
        startLockTimer();
      }

      btn.innerHTML = '登 录';
      btn.disabled  = false;
      errMsg.classList.add('show');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();

      // 抖动动画
      const card = document.querySelector('.login-card');
      card.style.animation = 'none';
      card.style.transform = 'translateX(-8px)';
      setTimeout(() => { card.style.transform = 'translateX(8px)'; }, 80);
      setTimeout(() => { card.style.transform = 'translateX(-5px)'; }, 160);
      setTimeout(() => { card.style.transform = 'translateX(0)'; }, 240);
    }
  }, 800);
}

function togglePw() {
  const input = document.getElementById('password');
  const btn   = document.getElementById('togglePwBtn');
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}
</script>
</body>
</html>
