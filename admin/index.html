<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泓锦浩机械 - 内容管理</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div id="nc-root"></div>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/netlify-identity-widget@1/dist/netlify-identity-widget.min.js"></script>
    <script>
        // 初始化 Netlify Identity Widget
        netlifyIdentity.init({
            APIUrl: 'https://hongjinhao.netlify.app/.netlify/identity'
        });
        
        // 处理 Recovery Token
        if (window.location.hash.includes('recovery_token')) {
            netlifyIdentity.open('recovery');
        }
    </script>
</body>
</html>
