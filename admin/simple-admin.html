<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泓锦浩机械 - 简易后台管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif; background: #f0f2f5; }
        
        .header { background: linear-gradient(135deg, #1a6db5, #2980b9); color: white; padding: 20px 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header h1 { font-size: 1.8rem; margin-bottom: 5px; }
        .header p { opacity: 0.9; font-size: 0.95rem; }
        
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        
        .card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); cursor: pointer; transition: all 0.3s; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .card-icon { font-size: 2.5rem; margin-bottom: 15px; }
        .card h3 { color: #1a6db5; margin-bottom: 10px; font-size: 1.3rem; }
        .card p { color: #64748b; font-size: 0.95rem; line-height: 1.5; }
        .card-stats { margin-top: 15px; padding-top: 15px; border-top: 1px solid #e2e8f0; color: #94a3b8; font-size: 0.9rem; }
        
        .editor { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: none; }
        .editor.active { display: block; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #334155; font-weight: 600; margin-bottom: 8px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 12px; border: 2px solid #e2e8f0; border-radius: 6px; font-size: 1rem; transition: border-color 0.2s; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #1a6db5; }
        .form-group textarea { min-height: 100px; resize: vertical; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; transition: all 0.2s; margin-right: 10px; }
        .btn-primary { background: #1a6db5; color: white; }
        .btn-primary:hover { background: #155a9a; }
        .btn-secondary { background: #e2e8f0; color: #475569; }
        .btn-secondary:hover { background: #cbd5e1; }
        .btn-success { background: #22c55e; color: white; }
        .btn-success:hover { background: #16a34a; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        
        .product-list { margin-top: 20px; }
        .product-item { background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .product-item:hover { background: #f1f5f9; }
        .product-info h4 { color: #1e293b; margin-bottom: 5px; }
        .product-info p { color: #64748b; font-size: 0.9rem; }
        
        .back-btn { margin-bottom: 20px; }
        
        .alert { padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; }
        .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        
        .preview { background: #f8fafc; padding: 15px; border-radius: 8px; margin-top: 15px; font-size: 0.9rem; color: #475569; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏭 泓锦浩机械 - 后台管理</h1>
        <p>简易内容管理系统 | 本地版本</p>
    </div>
    
    <div class="container">
        <!-- 仪表盘 -->
        <div id="dashboard" class="dashboard">
            <div class="card" onclick="showEditor('products')">
                <div class="card-icon">📦</div>
                <h3>产品管理</h3>
                <p>添加、编辑、删除产品信息</p>
                <div class="card-stats" id="product-count">加载中...</div>
            </div>
            
            <div class="card" onclick="showEditor('homepage')">
                <div class="card-icon">🏠</div>
                <h3>首页内容</h3>
                <p>编辑首页Banner标题和副标题</p>
                <div class="card-stats">2个字段可编辑</div>
            </div>
            
            <div class="card" onclick="showEditor('contact')">
                <div class="card-icon">📞</div>
                <h3>联系信息</h3>
                <p>编辑公司联系电话、邮箱、地址</p>
                <div class="card-stats">3个字段可编辑</div>
            </div>
        </div>
        
        <!-- 产品编辑器 -->
        <div id="editor-products" class="editor">
            <button class="btn btn-secondary back-btn" onclick="showDashboard()">← 返回首页</button>
            <h2 style="color: #1a6db5; margin-bottom: 20px;">📦 产品管理</h2>
            
            <button class="btn btn-success" onclick="showProductForm()">+ 添加新产品</button>
            
            <div id="product-form" style="display: none; margin-top: 20px; padding: 20px; background: #f8fafc; border-radius: 8px;">
                <h3 id="form-title" style="margin-bottom: 15px; color: #334155;">添加产品</h3>
                <div class="form-group">
                    <label>中文标题</label>
                    <input type="text" id="product-title-zh" placeholder="例如：高精度三坐标测量机">
                </div>
                <div class="form-group">
                    <label>英文标题</label>
                    <input type="text" id="product-title-en" placeholder="e.g. High Precision CMM">
                </div>
                <div class="form-group">
                    <label>型号</label>
                    <input type="text" id="product-model" placeholder="例如：ABC-1234">
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <input type="text" id="product-category" placeholder="例如：测量设备">
                </div>
                <div class="form-group">
                    <label>标识符（URL别名）</label>
                    <input type="text" id="product-slug" placeholder="例如：cmm-abc1234">
                </div>
                <div class="form-group">
                    <label>中文简介</label>
                    <textarea id="product-summary-zh" placeholder="简短的中文产品介绍"></textarea>
                </div>
                <div class="form-group">
                    <label>英文简介</label>
                    <textarea id="product-summary-en" placeholder="Brief English product description"></textarea>
                </div>
                <div class="form-group">
                    <label>中文详细描述（支持Markdown）</label>
                    <textarea id="product-desc-zh" placeholder="详细的中文产品描述，支持Markdown格式" style="min-height: 150px;"></textarea>
                </div>
                <div class="form-group">
                    <label>英文详细描述（支持Markdown）</label>
                    <textarea id="product-desc-en" placeholder="Detailed English product description, Markdown supported" style="min-height: 150px;"></textarea>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="product-featured"> 推荐产品（显示在首页）
                    </label>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="product-published" checked> 发布（取消勾选则为草稿）
                    </label>
                </div>
                <div class="form-group">
                    <label>排序权重（数字越大越靠前）</label>
                    <input type="number" id="product-weight" value="0">
                </div>
                <button class="btn btn-primary" onclick="saveProduct()">💾 保存产品</button>
                <button class="btn btn-secondary" onclick="cancelProductForm()">取消</button>
            </div>
            
            <div id="product-list" class="product-list">
                <p style="text-align: center; color: #94a3b8; padding: 30px;">加载中...</p>
            </div>
        </div>
        
        <!-- 首页编辑器 -->
        <div id="editor-homepage" class="editor">
            <button class="btn btn-secondary back-btn" onclick="showDashboard()">← 返回首页</button>
            <h2 style="color: #1a6db5; margin-bottom: 20px;">🏠 首页内容编辑</h2>
            
            <div class="form-group">
                <label>Banner 标题（中文）</label>
                <input type="text" id="homepage-banner-title" placeholder="欢迎来到上海泓锦浩">
            </div>
            <div class="form-group">
                <label>Banner 标题（英文）</label>
                <input type="text" id="homepage-banner-title-en" placeholder="Welcome to Shanghai Hongjinhao">
            </div>
            <div class="form-group">
                <label>Banner 副标题（中文）</label>
                <textarea id="homepage-banner-subtitle" placeholder="专注精密机械领域..."></textarea>
            </div>
            <div class="form-group">
                <label>Banner 副标题（英文）</label>
                <textarea id="homepage-banner-subtitle-en" placeholder="Focus on precision machinery..."></textarea>
            </div>
            
            <button class="btn btn-primary" onclick="saveHomepage()">💾 保存首页内容</button>
        </div>
        
        <!-- 联系信息编辑器 -->
        <div id="editor-contact" class="editor">
            <button class="btn btn-secondary back-btn" onclick="showDashboard()">← 返回首页</button>
            <h2 style="color: #1a6db5; margin-bottom: 20px;">📞 联系信息编辑</h2>
            
            <div class="form-group">
                <label>电话号码</label>
                <input type="text" id="contact-phone" placeholder="021-1234-5678">
            </div>
            <div class="form-group">
                <label>邮箱地址</label>
                <input type="text" id="contact-email" placeholder="info@hongjinhao.com">
            </div>
            <div class="form-group">
                <label>公司地址</label>
                <textarea id="contact-address" placeholder="上海市浦东新区..."></textarea>
            </div>
            
            <button class="btn btn-primary" onclick="saveContact()">💾 保存联系信息</button>
        </div>
    </div>
    
    <script>
        let products = [];
        let currentEditIndex = -1;
        
        // 显示仪表盘
        function showDashboard() {
            document.getElementById('dashboard').style.display = 'grid';
            document.querySelectorAll('.editor').forEach(e => e.classList.remove('active'));
            loadProductCount();
        }
        
        // 显示编辑器
        function showEditor(type) {
            document.getElementById('dashboard').style.display = 'none';
            document.querySelectorAll('.editor').forEach(e => e.classList.remove('active'));
            document.getElementById('editor-' + type).classList.add('active');
            
            if (type === 'products') {
                loadProducts();
            } else if (type === 'homepage') {
                loadHomepage();
            } else if (type === 'contact') {
                loadContact();
            }
        }
        
        // 加载产品数量
        function loadProductCount() {
            fetch('../assets/data/products.json')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('product-count').textContent = `共 ${data.products.length} 个产品`;
                })
                .catch(err => {
                    document.getElementById('product-count').textContent = '加载失败';
                });
        }
        
        // 加载产品列表
        function loadProducts() {
            fetch('../assets/data/products.json')
                .then(res => res.json())
                .then(data => {
                    products = data.products;
                    renderProductList();
                })
                .catch(err => {
                    document.getElementById('product-list').innerHTML = '<p style="color: #ef4444; text-align: center; padding: 30px;">加载失败，请检查文件是否存在</p>';
                });
        }
        
        // 渲染产品列表
        function renderProductList() {
            const listDiv = document.getElementById('product-list');
            if (products.length === 0) {
                listDiv.innerHTML = '<p style="text-align: center; color: #94a3b8; padding: 30px;">暂无产品，点击"添加新产品"按钮创建</p>';
                return;
            }
            
            listDiv.innerHTML = products.map((p, i) => `
                <div class="product-item">
                    <div class="product-info">
                        <h4>${p.title_zh} <span style="color: #94a3b8; font-size: 0.85rem;">${p.model || ''}</span></h4>
                        <p>${p.category || '未分类'} | ${p.published ? '✅ 已发布' : '⏸️ 草稿'} | ${p.featured ? '⭐ 推荐' : ''}</p>
                    </div>
                    <div>
                        <button class="btn btn-secondary" onclick="editProduct(${i})">编辑</button>
                        <button class="btn btn-danger" onclick="deleteProduct(${i})">删除</button>
                    </div>
                </div>
            `).join('');
        }
        
        // 显示产品表单
        function showProductForm(index = -1) {
            document.getElementById('product-form').style.display = 'block';
            document.getElementById('form-title').textContent = index === -1 ? '添加产品' : '编辑产品';
            currentEditIndex = index;
            
            if (index === -1) {
                // 清空表单
                document.getElementById('product-title-zh').value = '';
                document.getElementById('product-title-en').value = '';
                document.getElementById('product-model').value = '';
                document.getElementById('product-category').value = '';
                document.getElementById('product-slug').value = '';
                document.getElementById('product-summary-zh').value = '';
                document.getElementById('product-summary-en').value = '';
                document.getElementById('product-desc-zh').value = '';
                document.getElementById('product-desc-en').value = '';
                document.getElementById('product-featured').checked = false;
                document.getElementById('product-published').checked = true;
                document.getElementById('product-weight').value = '0';
            } else {
                // 填充表单
                const p = products[index];
                document.getElementById('product-title-zh').value = p.title_zh || '';
                document.getElementById('product-title-en').value = p.title_en || '';
                document.getElementById('product-model').value = p.model || '';
                document.getElementById('product-category').value = p.category || '';
                document.getElementById('product-slug').value = p.slug || '';
                document.getElementById('product-summary-zh').value = p.summary_zh || '';
                document.getElementById('product-summary-en').value = p.summary_en || '';
                document.getElementById('product-desc-zh').value = p.description_zh || '';
                document.getElementById('product-desc-en').value = p.description_en || '';
                document.getElementById('product-featured').checked = p.featured || false;
                document.getElementById('product-published').checked = p.published !== false;
                document.getElementById('product-weight').value = p.weight || 0;
            }
        }
        
        // 取消产品表单
        function cancelProductForm() {
            document.getElementById('product-form').style.display = 'none';
            currentEditIndex = -1;
        }
        
        // 保存产品
        function saveProduct() {
            const product = {
                title_zh: document.getElementById('product-title-zh').value.trim(),
                title_en: document.getElementById('product-title-en').value.trim(),
                model: document.getElementById('product-model').value.trim(),
                category: document.getElementById('product-category').value.trim(),
                slug: document.getElementById('product-slug').value.trim(),
                summary_zh: document.getElementById('product-summary-zh').value.trim(),
                summary_en: document.getElementById('product-summary-en').value.trim(),
                description_zh: document.getElementById('product-desc-zh').value.trim(),
                description_en: document.getElementById('product-desc-en').value.trim(),
                featured: document.getElementById('product-featured').checked,
                published: document.getElementById('product-published').checked,
                weight: parseInt(document.getElementById('product-weight').value) || 0
            };
            
            if (!product.title_zh) {
                alert('❌ 请输入中文标题');
                return;
            }
            
            if (currentEditIndex === -1) {
                products.push(product);
            } else {
                products[currentEditIndex] = product;
            }
            
            // 保存到 JSON 文件（需要后端支持，这里只是演示）
            alert('✅ 产品已保存到内存\n\n⚠️ 注意：由于浏览器安全限制，无法直接保存JSON文件。\n\n建议：\n1. 使用本地服务器 + PHP/Python后端\n2. 或手动编辑 assets/data/products.json');
            
            cancelProductForm();
            renderProductList();
        }
        
        // 编辑产品
        function editProduct(index) {
            showProductForm(index);
        }
        
        // 删除产品
        function deleteProduct(index) {
            if (confirm('确定要删除这个产品吗？')) {
                products.splice(index, 1);
                renderProductList();
                alert('✅ 产品已从列表删除\n\n⚠️ 注意：需要保存后才能永久生效');
            }
        }
        
        // 加载首页内容
        function loadHomepage() {
            fetch('../assets/data/homepage.md')
                .then(res => res.text())
                .then(text => {
                    const data = parseMarkdown(text);
                    document.getElementById('homepage-banner-title').value = data.banner_title || '';
                    document.getElementById('homepage-banner-title-en').value = data.banner_title_en || '';
                    document.getElementById('homepage-banner-subtitle').value = data.banner_subtitle || '';
                    document.getElementById('homepage-banner-subtitle-en').value = data.banner_subtitle_en || '';
                })
                .catch(err => console.error('加载首页内容失败', err));
        }
        
        // 保存首页内容
        function saveHomepage() {
            const content = `---
banner_title: "${document.getElementById('homepage-banner-title').value}"
banner_title_en: "${document.getElementById('homepage-banner-title-en').value}"
banner_subtitle: "${document.getElementById('homepage-banner-subtitle').value}"
banner_subtitle_en: "${document.getElementById('homepage-banner-subtitle-en').value}"
---`;
            
            alert('✅ 首页内容已准备保存\n\n⚠️ 注意：由于浏览器安全限制，无法直接保存文件。\n\n建议手动编辑：assets/data/homepage.md');
        }
        
        // 加载联系信息
        function loadContact() {
            fetch('../assets/data/contact.md')
                .then(res => res.text())
                .then(text => {
                    const data = parseMarkdown(text);
                    document.getElementById('contact-phone').value = data.phone || '';
                    document.getElementById('contact-email').value = data.email || '';
                    document.getElementById('contact-address').value = data.address || '';
                })
                .catch(err => console.error('加载联系信息失败', err));
        }
        
        // 保存联系信息
        function saveContact() {
            const content = `---
phone: "${document.getElementById('contact-phone').value}"
email: "${document.getElementById('contact-email').value}"
address: "${document.getElementById('contact-address').value}"
---`;
            
            alert('✅ 联系信息已准备保存\n\n⚠️ 注意：由于浏览器安全限制，无法直接保存文件。\n\n建议手动编辑：assets/data/contact.md');
        }
        
        // 解析 Markdown frontmatter
        function parseMarkdown(text) {
            const data = {};
            const match = text.match(/^---\n([\s\S]*?)\n---/);
            if (match) {
                const lines = match[1].split('\n');
                lines.forEach(line => {
                    const [key, ...values] = line.split(':');
                    if (key && values.length > 0) {
                        data[key.trim()] = values.join(':').trim().replace(/^"|"$/g, '');
                    }
                });
            }
            return data;
        }
        
        // 页面加载时
        window.addEventListener('load', function() {
            loadProductCount();
        });
    </script>
</body>
</html>
